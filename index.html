<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Origem do Sabor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1B4332;font-family:system-ui,-apple-system,sans-serif}
#app{height:100%;display:flex;justify-content:center;background:#1B4332}
#shell{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;background:#F4EBD9;position:relative}
#screen{flex:1;overflow-y:auto;overflow-x:hidden}
#nav{flex-shrink:0;display:flex;background:#fff;border-top:1px solid #eee;box-shadow:0 -2px 12px rgba(0,0,0,.07)}
.nb{flex:1;border:none;background:transparent;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative;color:#8A8A8A;font-family:inherit}
.nb.on{color:#1B4332}
.ni{font-size:20px}.nl{font-size:9px;font-weight:700;letter-spacing:.8px}
.topbar{position:absolute;top:0;left:20%;right:20%;height:2.5px;border-radius:2px;background:#1B4332}
.nalert{position:absolute;top:5px;right:calc(50% - 16px);min-width:16px;height:16px;border-radius:8px;background:#A4161A;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid #fff}
input,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.bdg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.8px;display:inline-flex;align-items:center;gap:4px}
.hdr{background:linear-gradient(135deg,#1B4332,#2D6A4F);padding:20px 20px 28px;border-radius:0 0 28px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(27,67,50,.35);flex-shrink:0}
.page{display:flex;flex-direction:column;gap:14px;padding-bottom:20px}
.pad{padding:0 16px;display:flex;flex-direction:column;gap:12px}
.slbl{color:#8A8A8A;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
.si{border:2px solid #EEE;border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fff;margin-bottom:6px;transition:border-color .15s,background .15s}
.si.on{border-color:#1B4332;background:#EAF2EE}
.btn-p{background:linear-gradient(135deg,#BC3926,#D94A35);color:#fff;border:none;border-radius:16px;padding:16px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(188,57,38,.4);width:100%;text-align:center}
.btn-g{background:linear-gradient(135deg,#1B4332,#2D6A4F);color:#fff;border:none;border-radius:16px;padding:15px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(27,67,50,.35);width:100%;text-align:center}
.btn-gold{background:linear-gradient(135deg,#B8860B,#C9920A);color:#fff;border:none;border-radius:16px;padding:16px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(201,146,10,.45);width:100%;text-align:center}
.btn-off{background:#CCC;color:#fff;border:none;border-radius:16px;padding:16px;font-weight:700;font-size:15px;cursor:not-allowed;width:100%;text-align:center}
.inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #DDD;font-size:14px;color:#2D2D2D;outline:none;box-sizing:border-box}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#F4EBD9;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:430px;display:flex;flex-direction:column;gap:16px;max-height:90vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.18)}
.cov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.cbox{background:#fff;border-radius:24px;padding:28px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.abar{border-top:1px solid #F0F0EE;display:flex}
.abtn{flex:1;padding:9px 0;border:none;font-weight:700;font-size:11px;cursor:pointer;background:transparent}
.paybtn{flex:1;padding:14px 8px;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;border:2px solid #DDD;background:#fff}
.alp{background:#FDECEA;border:2.5px solid #A4161A;border-radius:18px;padding:16px}
.aitem{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1.5px solid #ccc}
.splash{position:absolute;inset:0;background:linear-gradient(160deg,#1B4332,#0D2B1E);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:999}
@keyframes pls{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes p2{0%,100%{box-shadow:0 0 0 0 rgba(164,22,26,.6)}50%{box-shadow:0 0 0 10px rgba(164,22,26,0)}}
.blink{animation:blink .7s infinite}
.pulse2{animation:p2 1.4s infinite}
</style>
</head>
<body>
<div id="app"><div id="shell"><div id="screen"></div><div id="nav"></div></div></div>
<script>
// ─── COLORS ───────────────────────────────────────────
var C={
  dg:"#1B4332",mg:"#2D6A4F",cr:"#F4EBD9",
  ter:"#BC3926",td:"#2D2D2D",tm:"#5A5A5A",tl:"#8A8A8A",
  w:"#FFFFFF",sg:"#2D6A4F",sy:"#D4A017",sr:"#A4161A",
  gold:"#C9920A",sil:"#7A8FA6",bro:"#A0522D"
};

// ─── PERSISTÊNCIA localStorage ────────────────────────
var LS_KEY="origem_db_v1";

function dbVazio(){
  return{products:[],customers:[],sales:[],
    monthly:[{m:"JAN",k:0},{m:"FEV",k:0},{m:"MAR",k:0},{m:"ABR",k:0},{m:"MAI",k:0},{m:"JUN",k:0}]};
}

function salvarDB(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(DB));}catch(e){}
}

function carregarDB(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(raw){
      var p=JSON.parse(raw);
      if(!p.products)p.products=[];
      if(!p.customers)p.customers=[];
      if(!p.sales)p.sales=[];
      if(!p.monthly)p.monthly=dbVazio().monthly;
      return p;
    }
  }catch(e){}
  return dbVazio();
}

// ─── DATABASE (salvo no dispositivo) ──────────────────
var DB=carregarDB();

// ─── STATE ────────────────────────────────────────────
var S={
  tab:"vendas", splash:true,
  // vendas
  sp:null, sc:null, qty:"", pt:"AV", dd:"", dm:"", dy:"", sok:false,
  // produtos
  ps:"", pc:"TODOS", pm:false, peid:null,
  pf:{name:"",cat:"SALAME",pu:"",sq:"",ut:"KG"},
  // clientes
  cs:"", csel:null, cm:null, ceid:null,
  cf:{name:"",ph:"",tier:"REGULAR"}, ctk:null,
  // historico
  dis:{}
};

// ─── HELPERS ──────────────────────────────────────────
function R(n){return Math.round(n*100)/100}
function BRL(v){return"R$ "+v.toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}
function CI(c){return{SALAME:"🥩",CURADO:"🍖",LINGUICA:"🌭",DEFUMADO:"💨"}[c]||"🍽️"}
function SK(q){return q<=5?{l:"ESTOQUE BAIXO",c:C.sr,b:"#FDECEA"}:q<=15?{l:"ESTOQUE MÉDIO",c:C.sy,b:"#FFF8E1"}:{l:"ESTOQUE ALTO",c:C.sg,b:"#E8F5E9"}}
function TC(t){return t==="VIP"?{c:C.gold,b:"#FFF8E0",l:"⭐ VIP"}:t==="PREMIUM"?{c:"#5A7DB5",b:"#EEF2FB",l:"💎 PREMIUM"}:{c:C.tm,b:"#F0F0F0",l:"REGULAR"}}
function SS(s){return s==="ENTREGUE"?{c:C.sg,b:"#E8F5E9"}:s==="ENVIADO"?{c:"#1565C0",b:"#E3F2FD"}:{c:C.sy,b:"#FFF8E1"}}
function AGO(ts){var d=Date.now()-ts,m=Math.floor(d/60000);if(m<60)return"Há "+m+"min";return"Há "+Math.floor(m/60)+"h"}
function DS(s){
  if(!s.due)return null;
  var df=s.due-Date.now(),dy=Math.ceil(df/86400000);
  if(df<0)return{t:"V",dy:Math.abs(dy),l:"Venceu há "+Math.abs(dy)+"d",c:C.sr,b:"#FDECEA",i:"🚨"};
  if(dy===0)return{t:"H",dy:0,l:"Vence HOJE!",c:C.sr,b:"#FFF0F0",i:"⏰"};
  if(dy<=3)return{t:"U",dy:dy,l:"Vence em "+dy+"d",c:"#E65100",b:"#FFF3E0",i:"⚠️"};
  if(dy<=7)return{t:"P",dy:dy,l:"Vence em "+dy+"d",c:C.sy,b:"#FFF8E1",i:"📅"};
  return{t:"O",dy:dy,l:"Vence em "+dy+"d",c:C.sg,b:"#E8F5E9",i:"✅"}
}
function ACT(){
  return DB.sales.filter(function(s){
    if(!s.due||s.paid)return false;
    return Math.ceil((s.due-Date.now())/86400000)<=3;
  }).length;
}
function BDG(l,c,b){return'<span class="bdg" style="background:'+b+';color:'+c+'">'+l+'</span>'}
function HDR(sub){
  return'<div class="hdr"><div style="width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">🥩</div><div><div style="font-family:Georgia,serif;font-weight:700;color:#fff;font-size:22px">Origem do Sabor</div><div style="color:rgba(255,255,255,.7);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:2px">'+sub+'</div></div></div>';
}
function CARD(h,st){return'<div class="card"'+(st?' style="'+st+'"':'')+'>'+h+'</div>'}

function ALARM(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,200,400,600].forEach(function(o){
      var osc=ctx.createOscillator(),g=ctx.createGain();
      osc.connect(g);g.connect(ctx.destination);
      osc.type="square";osc.frequency.value=880;
      g.gain.setValueAtTime(.3,ctx.currentTime+o/1000);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+o/1000+.15);
      osc.start(ctx.currentTime+o/1000);
      osc.stop(ctx.currentTime+o/1000+.15);
    });
  }catch(e){}
}

// ─── ENGINE ───────────────────────────────────────────
var _iv=null;
function go(p){Object.assign(S,p);draw()}
function db(fn){DB=fn(DB);salvarDB();draw()}
function draw(){
  var sc=document.getElementById("screen");
  var nv=document.getElementById("nav");
  if(!sc||!nv)return;

  // SPLASH
  if(S.splash){
    sc.innerHTML='<div class="splash"><div style="font-size:80px;animation:pls 2s infinite">🛡️</div><div style="text-align:center"><div style="font-family:Georgia,serif;color:#fff;font-size:32px;font-weight:700">Origem do Sabor</div><div style="color:rgba(255,255,255,.55);letter-spacing:3px;font-size:12px;text-transform:uppercase;margin-top:6px">Charcutaria Artesanal</div></div><div style="width:48px;height:2px;background:rgba(255,255,255,.25);border-radius:2px"></div><div style="color:rgba(255,255,255,.3);font-size:20px">🍴</div></div>';
    nv.innerHTML="";
    setTimeout(function(){go({splash:false})},2200);
    return;
  }

  // NAV
  var tabs=[["vendas","🛒","VENDAS"],["produtos","🏷️","PRODUTOS"],["clientes","👥","CLIENTES"],["ranking","🏆","RANKING"],["historico","🕐","HISTÓRICO"]];
  var ac=ACT();
  nv.innerHTML=tabs.map(function(t){
    var on=S.tab===t[0];
    return'<button class="nb'+(on?' on':'')+'" data-tab="'+t[0]+'">'+(on?'<div class="topbar"></div>':'')+'<span class="ni">'+t[1]+'</span><span class="nl">'+t[2]+'</span>'+(t[0]==="historico"&&ac>0?'<div class="nalert blink">'+ac+'</div>':'')+'</button>';
  }).join("");

  // PAGE
  if(S.tab==="vendas")    {sc.innerHTML=pgV();bindV();}
  else if(S.tab==="produtos")  {sc.innerHTML=pgP();bindP();}
  else if(S.tab==="clientes")  {sc.innerHTML=pgC();bindC();}
  else if(S.tab==="ranking")   {sc.innerHTML=pgR();}
  else if(S.tab==="historico") {sc.innerHTML=pgH();bindH();}

  // ALARM
  clearInterval(_iv);
  if(S.tab==="historico"){
    var urg=DB.sales.filter(function(s){
      if(!s.due||s.paid||S.dis[s.id])return false;
      return Math.ceil((s.due-Date.now())/86400000)<=3;
    });
    if(urg.length){ALARM();_iv=setInterval(function(){ALARM();draw()},5000);}
  }
}

// NAV clicks
document.addEventListener("click",function(e){
  var btn=e.target.closest("[data-tab]");
  if(btn)go({tab:btn.dataset.tab});
});

// ════════════════════════════════════════
// VENDAS
// ════════════════════════════════════════
function pgV(){
  var pr=S.sp?DB.products.filter(function(p){return p.id===S.sp})[0]:null;
  var isKg=pr&&pr.ut==="KG";
  var qn=parseFloat(S.qty)||0;
  var tot=pr?R(pr.pu*qn):0;
  var dueTs=null;
  if(S.pt==="AP"&&S.dd&&S.dm&&S.dy){
    var d=+S.dd,m=+S.dm,y=+S.dy;
    if(d>=1&&d<=31&&m>=1&&m<=12&&y>=2024)dueTs=new Date(y,m-1,d,23,59,59).getTime();
  }
  var ok=S.sp&&S.sc&&qn>0&&(S.pt==="AV"||dueTs);

  // Products
  var phtml=DB.products.map(function(p){
    var s=SK(p.sq);
    var on=S.sp===p.id?" on":"";
    return'<div class="si'+on+'" data-action="selProd" data-id="'+p.id+'">'
      +'<div><div style="font-weight:700;color:'+C.td+';font-size:14px">'+CI(p.cat)+' '+p.name+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:4px;align-items:center">'+BDG(s.l,s.c,s.b)+'<span style="font-size:11px;color:'+C.tl+'">'+p.sq+' '+p.ut.toLowerCase()+'</span></div></div>'
      +'<div style="font-family:Georgia,serif;font-weight:700;color:'+C.ter+';font-size:15px">'+BRL(p.pu)+'</div></div>';
  }).join("");

  // Customers
  var custMsg=DB.customers.length===0?'<div style="text-align:center;padding:16px;color:#8A8A8A;font-size:13px">⚠️ Nenhum cliente cadastrado. Cadastre clientes na aba <strong>Clientes</strong> primeiro.</div>':"";
  var chtml=DB.customers.map(function(c){
    var t=TC(c.tier);
    var on=S.sc===c.id?" on":"";
    return'<div class="si'+on+'" data-action="selCust" data-id="'+c.id+'">'
      +'<div><div style="font-weight:700;color:'+C.td+'">'+c.name+'</div>'
      +'<div style="font-size:12px;color:'+C.tl+'">'+c.ph+'</div></div>'
      +BDG(t.l,t.c,t.b)+'</div>';
  }).join("");

  // Qty
  var qcard=S.sp?CARD(
    '<div class="slbl">QUANTIDADE '+(isKg?"(KG)":"(UN)")+'</div>'
    +'<div style="display:flex;gap:10px;align-items:center">'
    +'<input id="qinp" type="number" value="'+S.qty+'" placeholder="'+(isKg?"Ex: 0.850":"Ex: 2")+'" step="'+(isKg?".05":"1")+'" style="flex:1;padding:12px 14px;border-radius:12px;border:1.5px solid #DDD;font-size:16px;font-weight:700;background:#F4EBD9;outline:none"/>'
    +'<div style="background:#F4EBD9;border-radius:12px;padding:12px 16px;font-family:Georgia,serif;font-weight:700;color:'+C.ter+';font-size:18px;min-width:100px;text-align:center" id="tot-preview">'+BRL(tot)+'</div></div>'
  ):"";

  // Due date fields
  var prazoF=S.pt==="AP"?
    '<div style="margin-top:16px">'
    +'<div class="slbl">📅 DATA DE VENCIMENTO</div>'
    +'<div style="display:flex;gap:8px;align-items:center">'
    +'<div style="flex:1;text-align:center"><div style="font-size:10px;color:'+C.tl+';font-weight:700;margin-bottom:4px">DIA</div>'
    +'<input id="ddin" type="number" value="'+S.dd+'" min="1" max="31" placeholder="DD" style="width:100%;padding:12px 8px;border-radius:12px;text-align:center;border:2px solid '+(S.dd?C.gold:"#DDD")+';font-size:18px;font-weight:700;background:'+(S.dd?"#FFF8E0":"#fff")+';outline:none"/></div>'
    +'<div style="font-size:22px;color:'+C.tl+';padding-top:16px">/</div>'
    +'<div style="flex:1;text-align:center"><div style="font-size:10px;color:'+C.tl+';font-weight:700;margin-bottom:4px">MÊS</div>'
    +'<input id="dmin" type="number" value="'+S.dm+'" min="1" max="12" placeholder="MM" style="width:100%;padding:12px 8px;border-radius:12px;text-align:center;border:2px solid '+(S.dm?C.gold:"#DDD")+';font-size:18px;font-weight:700;background:'+(S.dm?"#FFF8E0":"#fff")+';outline:none"/></div>'
    +'<div style="font-size:22px;color:'+C.tl+';padding-top:16px">/</div>'
    +'<div style="flex:2;text-align:center"><div style="font-size:10px;color:'+C.tl+';font-weight:700;margin-bottom:4px">ANO</div>'
    +'<input id="dyin" type="number" value="'+S.dy+'" min="2024" placeholder="AAAA" style="width:100%;padding:12px 8px;border-radius:12px;text-align:center;border:2px solid '+(S.dy?C.gold:"#DDD")+';font-size:18px;font-weight:700;background:'+(S.dy?"#FFF8E0":"#fff")+';outline:none"/></div>'
    +'</div>'
    +(dueTs?'<div style="margin-top:10px;padding:10px 14px;border-radius:10px;background:#FFF8E0;border:1px solid '+C.gold+';display:flex;align-items:center;gap:8px"><span>📅</span><span style="font-weight:700;color:'+C.gold+';font-size:13px">Vencimento: '+pad2(S.dd)+'/'+pad2(S.dm)+'/'+S.dy+'</span></div>':"")
    +'</div>':"";

  // Payment card
  var paycard=CARD(
    '<div class="slbl">FORMA DE PAGAMENTO</div>'
    +'<div style="display:flex;gap:10px">'
    +'<button class="paybtn" data-action="setPT" data-v="AV" style="border-color:'+(S.pt==="AV"?C.sg:"#DDD")+';background:'+(S.pt==="AV"?"#E8F5E9":"#fff")+'">'
    +'<span style="font-size:24px">💵</span>'
    +'<span style="font-weight:700;font-size:13px;color:'+(S.pt==="AV"?C.sg:C.td)+'">À VISTA</span>'
    +'<span style="font-size:10px;color:'+(S.pt==="AV"?C.sg:C.tl)+'">Pagamento imediato</span></button>'
    +'<button class="paybtn" data-action="setPT" data-v="AP" style="border-color:'+(S.pt==="AP"?C.gold:"#DDD")+';background:'+(S.pt==="AP"?"#FFF8E0":"#fff")+'">'
    +'<span style="font-size:24px">📅</span>'
    +'<span style="font-weight:700;font-size:13px;color:'+(S.pt==="AP"?C.gold:C.td)+'">A PRAZO</span>'
    +'<span style="font-size:10px;color:'+(S.pt==="AP"?C.gold:C.tl)+'">Com data de vencimento</span></button>'
    +'</div>'+prazoF
  );

  var okBn=S.sok?'<div style="background:'+(S.pt==="AV"?"#E8F5E9":"#FFF8E0")+';border:1.5px solid '+(S.pt==="AV"?C.sg:C.gold)+';border-radius:14px;padding:14px;text-align:center;font-weight:700;color:'+(S.pt==="AV"?C.sg:C.gold)+'">'+(S.pt==="AV"?"✅ Venda à vista registrada!":"📅 Venda a prazo registrada! Vence em "+S.dd+"/"+S.dm+"/"+S.dy)+'</div>':"";

  var finBtn=ok?(S.pt==="AV"
    ?'<button class="btn-p" data-action="finV">💵 FINALIZAR VENDA À VISTA</button>'
    :'<button class="btn-gold" data-action="finV">📅 REGISTRAR VENDA A PRAZO</button>')
    :'<div class="btn-off">'+(S.pt==="AV"?"💵 FINALIZAR VENDA":"📅 REGISTRAR VENDA A PRAZO")+'</div>';

  var phmsg=DB.products.length===0?'<div style="text-align:center;padding:16px;color:#8A8A8A;font-size:13px">⚠️ Nenhum produto cadastrado. Cadastre produtos na aba <strong>Produtos</strong> primeiro.</div>':"";
  return'<div class="page">'+HDR("Nova Venda")+'<div class="pad">'+okBn
    +CARD('<div class="slbl">SELECIONAR PRODUTO</div>'+phmsg+phtml)
    +CARD('<div class="slbl">SELECIONAR CLIENTE</div>'+custMsg+chtml)
    +qcard+paycard+finBtn
    +'</div></div>';
}

function pad2(v){return String(v).padStart(2,"0")}

function bindV(){
  var q=document.getElementById("qinp");
  if(q)q.addEventListener("input",function(){
    S.qty=this.value;
    var pr=null;for(var i=0;i<DB.products.length;i++)if(DB.products[i].id===S.sp){pr=DB.products[i];break;}

      +'</div></div></div>';
  }
  return'<div class="page">'+HDR("Ranking de Clientes")+'<div class="pad">'
    +'<div style="display:flex;justify-content:center;align-items:flex-end;gap:10px;padding:16px 0 8px">'+pod+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center">'
    +["Mês","Ano","Geral"].map(function(p,i){return'<button style="padding:9px 22px;border-radius:20px;border:1.5px solid '+(i===0?C.dg:"#DDD")+';background:'+(i===0?C.dg:"#fff")+';color:'+(i===0?"#fff":C.td)+';font-weight:600;font-size:14px;cursor:pointer">'+p+'</button>';}).join("")
    +'</div>'+restH+'</div></div>';
}

// ════════════════════════════════════════
// HISTÓRICO
// ════════════════════════════════════════
function pgH(){
  var prazo=DB.sales.filter(function(s){return s.pt==="AP"&&!s.paid;}).sort(function(a,b){return(a.due||0)-(b.due||0);});
  var alerts=prazo.filter(function(s){var d=DS(s);return d&&(d.t==="V"||d.t==="H"||d.t==="U")&&!S.dis[s.id];});

  function getCust(cid){for(var i=0;i<DB.customers.length;i++)if(DB.customers[i].id===cid)return DB.customers[i];return null;}
  function getProd(pid){for(var i=0;i<DB.products.length;i++)if(DB.products[i].id===pid)return DB.products[i];return null;}

  // ── KPIs calculados dos dados reais ──────────────────
  var totalKg=0;
  DB.sales.forEach(function(s){
    var pr=getProd(s.pid);
    if(pr&&pr.ut==="KG"){
      // qty guardado como "1.2 kg" → extrai o número
      var n=parseFloat(s.qty);
      if(!isNaN(n))totalKg+=n;
    }
  });
  totalKg=Math.round(totalKg*100)/100;

  // Produto mais vendido por valor total
  var pvMap={};
  DB.sales.forEach(function(s){if(!pvMap[s.pn])pvMap[s.pn]=0;pvMap[s.pn]+=s.tv;});
  var topProd="—",topVal=0;
  Object.keys(pvMap).forEach(function(k){if(pvMap[k]>topVal){topVal=pvMap[k];topProd=k;}});

  // Faturamento total e total de pedidos
  var fatTotal=DB.sales.reduce(function(acc,s){return acc+s.tv;},0);
  var totalPed=DB.sales.length;

  // ── Gráfico: kg vendidos por mês (últimos 6 meses) ───
  var meses=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
  var kgPorMes={};
  DB.sales.forEach(function(s){
    var pr=getProd(s.pid);
    if(pr&&pr.ut==="KG"){
      var n=parseFloat(s.qty);
      if(!isNaN(n)){var mn=meses[new Date(s.ts).getMonth()];kgPorMes[mn]=(kgPorMes[mn]||0)+n;}
    }
  });
  var hoje=new Date(),chartData=[];
  for(var mi=5;mi>=0;mi--){
    var d2=new Date(hoje.getFullYear(),hoje.getMonth()-mi,1);
    var mn2=meses[d2.getMonth()];
    chartData.push({m:mn2,k:Math.round((kgPorMes[mn2]||0)*100)/100});
  }
  var maxK2=0;chartData.forEach(function(d){if(d.k>maxK2)maxK2=d.k;});
  if(maxK2===0)maxK2=1;
  var cm2=chartData[chartData.length-1];
  var bars=chartData.map(function(m,i){
    var h=Math.round((m.k/maxK2)*70),cur=i===chartData.length-1;
    return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">'
      +'<div style="width:100%;height:'+h+'px;border-radius:6px 6px 0 0;background:'+(cur?C.dg:"#D4E8DC")+'"></div>'
      +'<div style="font-size:10px;font-weight:700;color:'+(cur?C.dg:C.tl)+';letter-spacing:.5px">'+m.m+'</div></div>';
  }).join("");

  // ── Painel de alertas urgentes ────────────────────────
  var alP="";
  if(alerts.length){
    alP='<div class="alp pulse2">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
      +'<span style="font-size:26px" class="blink">🚨</span>'
      +'<div><div style="font-weight:800;color:'+C.sr+';font-size:15px">ALERTA DE VENCIMENTO!</div>'
      +'<div style="font-size:12px;color:#C62828">'+alerts.length+' venda'+(alerts.length>1?"s":"")+" precisam de atenção"+'</div></div>'
      +'<button data-action="playAlarm" style="margin-left:auto;background:'+C.sr+';border:none;border-radius:8px;padding:6px 10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">🔔 SOM</button>'
      +'</div>'
      +alerts.map(function(s){var d=DS(s),cu=getCust(s.cid);return'<div class="aitem" style="border-color:'+d.c+'">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div><div style="font-weight:700;color:'+C.td+';font-size:14px">'+d.i+' '+s.pn+'</div>'
        +'<div style="font-size:12px;color:'+C.tm+';margin-top:2px">👤 '+(cu?cu.name:"—")+' • '+BRL(s.tv)+'</div>'
        +'<div style="font-size:12px;font-weight:800;color:'+d.c+';margin-top:4px">'+d.l+'</div></div>'
        +'<div style="display:flex;flex-direction:column;gap:6px;margin-left:10px">'
        +'<button data-action="markPaid" data-id="'+s.id+'" style="padding:7px 12px;border-radius:8px;border:none;background:'+C.sg+';color:#fff;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap">✅ PAGO</button>'
        +'<button data-action="disAlarm" data-id="'+s.id+'" style="padding:7px 12px;border-radius:8px;border:1px solid #DDD;background:#F5F5F5;color:'+C.tm+';font-weight:700;font-size:11px;cursor:pointer">✕ OK</button>'
        +'</div></div></div>';}).join("")+'</div>';
  }

  // ── Vendas a Prazo pendentes ──────────────────────────
  var prazoSec="";
  if(prazo.length){
    prazoSec='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'
      +'<div style="font-family:Georgia,serif;font-weight:700;font-size:17px;color:'+C.td+'">📅 Vendas a Prazo</div>'
      +BDG(prazo.length+" pendente"+(prazo.length>1?"s":""),C.gold,"#FFF8E0")+'</div>'
      +prazo.map(function(s){var d=DS(s),cu=getCust(s.cid);
        return'<div class="card" style="border:2px solid '+(d?d.c:"#EEE")+';padding:0;overflow:hidden">'
          +'<div style="padding:12px 14px">'
          +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
          +'<div style="flex:1"><div style="font-weight:700;color:'+C.td+';font-size:14px">'+s.pn+'</div>'
          +'<div style="font-size:12px;color:'+C.tm+';margin-top:2px">👤 '+(cu?cu.name:"—")+' • '+s.qty+'</div>'
          +(d?'<div class="bdg'+(d.t==="V"||d.t==="H"?" blink":"")+'" style="margin-top:6px;background:'+d.b+';color:'+d.c+'">'+d.i+' '+d.l+'</div>':"")
          +'</div>'
          +'<div style="text-align:right;margin-left:10px"><div style="font-weight:700;color:'+C.ter+';font-size:15px">'+BRL(s.tv)+'</div><div style="font-size:11px;color:'+C.tl+';margin-top:2px">A PRAZO</div></div>'
          +'</div></div>'
          +'<div class="abar">'
          +'<button class="abtn" data-action="markPaid" data-id="'+s.id+'" style="background:#E8F5E9;color:'+C.sg+';border-right:1px solid #F0F0EE">✅ MARCAR COMO PAGO</button>'
          +'<button class="abtn" data-action="disAlarm" data-id="'+s.id+'" style="background:#F5F5F5;color:'+C.tm+'">✕ DISPENSAR</button>'
          +'</div></div>';
      }).join("");
  }

  // ── Lista de todos os pedidos ─────────────────────────
  var allS=DB.sales.length===0
    ?'<div style="text-align:center;padding:24px;color:'+C.tl+';display:flex;flex-direction:column;align-items:center;gap:10px"><div style="font-size:40px">🧾</div><div style="font-size:13px">Nenhuma venda registrada ainda.</div></div>'
    :DB.sales.map(function(s){
      var ss=SS(s.st),d=DS(s),av=s.pt==="AV"||!s.pt;
      return CARD('<div style="display:flex;gap:12px;align-items:center">'
        +'<div style="width:44px;height:44px;border-radius:12px;flex-shrink:0;background:'+(av?"linear-gradient(135deg,#F4EBD9,#EDE0CA)":"#FFF8E0")+';display:flex;align-items:center;justify-content:center;font-size:22px">'+(av?"💵":"📅")+'</div>'
        +'<div style="flex:1">'
        +'<div style="font-weight:700;color:'+C.td+';font-size:14px">'+s.pn+'</div>'
        +'<div style="font-size:11px;color:'+C.tl+';margin-top:2px">'+AGO(s.ts)+' • '+s.qty+'</div>'
        +(d&&!s.paid?'<div style="font-size:11px;font-weight:700;color:'+d.c+';margin-top:2px">'+d.i+' '+d.l+'</div>':"")
        +(s.paid&&s.pt==="AP"?'<div style="font-size:11px;font-weight:700;color:'+C.sg+';margin-top:2px">✅ Pago</div>':"")
        +'</div>'
        +'<div style="text-align:right"><div style="font-weight:700;color:'+C.ter+';font-size:14px">'+BRL(s.tv)+'</div>'+BDG(s.st,ss.c,ss.b)+'</div>'
        +'</div>');
    }).join("");

  // ── Monta a tela ──────────────────────────────────────
  return'<div class="page">'+HDR("Histórico de Embutidos")+'<div class="pad">'
    +alP
    +'<div class="g2">'
    +CARD('<div style="font-size:11px;color:'+C.tl+';font-weight:700;letter-spacing:1px">PESO TOTAL VENDIDO</div>'
      +'<div style="font-family:Georgia,serif;font-weight:700;color:'+C.td+';font-size:24px;margin-top:4px">'+(totalKg>0?totalKg.toLocaleString("pt-BR")+" kg":"0 kg")+'</div>'
      +'<div style="color:'+C.sg+';font-size:12px;font-weight:700;margin-top:4px">'+(totalKg>0?"↗ Registrado":"Sem vendas em kg")+'</div>')
    +CARD('<div style="font-size:11px;color:'+C.tl+';font-weight:700;letter-spacing:1px">MAIS VENDIDO</div>'
      +'<div style="font-family:Georgia,serif;font-weight:700;color:'+C.td+';font-size:15px;margin-top:4px;word-break:break-word">'+topProd+'</div>'
      +'<div style="color:'+C.sg+';font-size:12px;font-weight:700;margin-top:4px">'+(topProd!=="—"?BRL(topVal):"Sem vendas ainda")+'</div>')
    +'</div>'
    +CARD('<div style="display:flex">'
      +'<div style="flex:1;text-align:center;padding:4px 8px">'
      +'<div style="font-size:10px;color:'+C.tl+';font-weight:700;letter-spacing:1px">FATURAMENTO TOTAL</div>'
      +'<div style="font-family:Georgia,serif;font-weight:700;color:'+C.ter+';font-size:18px;margin-top:4px">'+BRL(fatTotal)+'</div></div>'
      +'<div style="width:1px;background:#F0F0EE;margin:4px 0"></div>'
      +'<div style="flex:1;text-align:center;padding:4px 8px">'
      +'<div style="font-size:10px;color:'+C.tl+';font-weight:700;letter-spacing:1px">TOTAL PEDIDOS</div>'
      +'<div style="font-family:Georgia,serif;font-weight:700;color:'+C.dg+';font-size:18px;margin-top:4px">'+totalPed+'</div></div>'
    +'</div>')
    +CARD('<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
      +'<div><div style="font-weight:700;color:'+C.td+';font-size:15px">Produção Mensal (kg)</div>'
      +'<div style="font-size:11px;color:'+C.tl+';margin-top:2px">Cura &amp; Defumação '+new Date().getFullYear()+'</div></div>'
      +'<div style="text-align:right"><div style="font-family:Georgia,serif;font-weight:700;color:'+C.dg+';font-size:20px">'+cm2.k.toLocaleString("pt-BR")+' kg</div>'
      +'<div style="color:'+C.sg+';font-size:11px;font-weight:700">Mês atual</div></div></div>'
      +'<div style="display:flex;align-items:flex-end;gap:8px;height:80px">'+bars+'</div>')
    +'<button style="background:linear-gradient(135deg,'+C.ter+',#D94A35);color:#fff;border:none;border-radius:16px;padding:16px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(188,57,38,.4);width:100%">📄 GERAR RELATÓRIO PDF</button>'
    +prazoSec
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'
    +'<div style="font-family:Georgia,serif;font-weight:700;font-size:17px;color:'+C.td+'">Pedidos de Charcutaria</div>'
    +BDG("HOJE",C.tm,"#EEE")
    +'</div>'
    +allS
    +'</div></div>';
}

// ─── ESCAPE HELPER ────────────────────────────────────
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ─── GLOBAL CLICK DISPATCHER ──────────────────────────
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-action]");
  if(!el)return;
  var a=el.dataset.action,id=el.dataset.id,v=el.dataset.v;

  // VENDAS
  if(a==="selProd"){go({sp:id});return;}
  if(a==="selCust"){go({sc:id});return;}
  if(a==="setPT"){go({pt:v});return;}
  if(a==="finV"){doFinV();return;}

  // PRODUTOS
  if(a==="setPCat"){go({pc:v});return;}
  if(a==="newP"){go({pm:true,peid:null,pf:{name:"",cat:"SALAME",pu:"",sq:"",ut:"KG"}});return;}
  if(a==="delP"){db(function(d){return Object.assign({},d,{products:d.products.filter(function(p){return p.id!==id;})});});return;}
  if(a==="editP"){
    var p=null;for(var i=0;i<DB.products.length;i++)if(DB.products[i].id===id){p=DB.products[i];break;}
    if(p)go({pm:true,peid:id,pf:{name:p.name,cat:p.cat,pu:String(p.pu),sq:String(p.sq),ut:p.ut}});return;}
  if(a==="addStk"){db(function(d){return Object.assign({},d,{products:d.products.map(function(p){return p.id===id?Object.assign({},p,{sq:p.sq+10}):p;})});});return;}
  if(a==="setPFcat"){go({pf:Object.assign({},S.pf,{cat:v})});return;}
  if(a==="setPFut"){go({pf:Object.assign({},S.pf,{ut:v})});return;}
  if(a==="closePM"){go({pm:false});return;}
  if(a==="saveP"){
    var nm=document.getElementById("pfname");
    var pu=document.getElementById("pfpu");
    var sq=document.getElementById("pfsq");
    var name=nm?nm.value.trim():S.pf.name.trim();
    if(!name)return;
    var entry={id:S.peid||("p"+Date.now()),name:name,cat:S.pf.cat,pu:parseFloat(pu?pu.value:S.pf.pu)||0,sq:parseFloat(sq?sq.value:S.pf.sq)||0,ut:S.pf.ut};
    db(function(d){return Object.assign({},d,{products:S.peid?d.products.map(function(p){return p.id===S.peid?entry:p;}):d.products.concat([entry])});});
    go({pm:false,peid:null});return;}

  // CLIENTES
  if(a==="addC"){go({cm:"add",ceid:null,cf:{name:"",ph:"",tier:"REGULAR"}});return;}
  if(a==="viewC"){go({csel:id});return;}
  if(a==="backC"){go({csel:null});return;}
  if(a==="editC"){
    var c=null;for(var j=0;j<DB.customers.length;j++)if(DB.customers[j].id===id){c=DB.customers[j];break;}
    if(c)go({cm:"edit",ceid:id,cf:{name:c.name,ph:c.ph,tier:c.tier}});return;}
  if(a==="delC"){
    var c2=null;for(var k=0;k<DB.customers.length;k++)if(DB.customers[k].id===id){c2=DB.customers[k];break;}
    if(c2)go({cm:"delete",ceid:id,cf:{name:c2.name,ph:c2.ph,tier:c2.tier}});return;}
  if(a==="closeCM"){go({cm:null});return;}
  if(a==="setCFtier"){go({cf:Object.assign({},S.cf,{tier:v})});return;}
  if(a==="saveC"){doSaveC();return;}
  if(a==="confDelC"){doDelC();return;}

  // HISTÓRICO
  if(a==="markPaid"){
    db(function(d){return Object.assign({},d,{sales:d.sales.map(function(s){return s.id===id?Object.assign({},s,{paid:true}):s;})});});
    var dis=Object.assign({},S.dis);dis[id]=true;go({dis:dis});return;}
  if(a==="disAlarm"){var dis2=Object.assign({},S.dis);dis2[id]=true;go({dis:dis2});return;}
  if(a==="playAlarm"){ALARM();return;}
});

// ─── OVERLAY CLOSE (click backdrop) ──────────────────
document.addEventListener("click",function(e){
  if(e.target.id==="pmov"||e.target.id==="cmov")go({pm:false,cm:null});
});

// ─── ACTION FUNCTIONS ─────────────────────────────────
function doFinV(){
  var pr=null;for(var i=0;i<DB.products.length;i++)if(DB.products[i].id===S.sp){pr=DB.products[i];break;}
  if(!pr)return;
  var isKg=pr.ut==="KG",qn=parseFloat(S.qty)||0,tv=R(pr.pu*qn);
  var dueTs=null;
  if(S.pt==="AP"){var d=+S.dd,m=+S.dm,y=+S.dy;dueTs=new Date(y,m-1,d,23,59,59).getTime();}
  var ns={id:"s"+Date.now(),cid:S.sc,pid:S.sp,ts:Date.now(),tv:tv,qty:isKg?S.qty+" kg":S.qty+" un",st:"PREPARANDO",pn:pr.name,pt:S.pt,due:dueTs,paid:S.pt==="AV"};
  db(function(d){return Object.assign({},d,{
    products:d.products.map(function(p){return p.id===S.sp?Object.assign({},p,{sq:Math.max(0,p.sq-qn)}):p;}),
    customers:d.customers.map(function(c){return c.id===S.sc?Object.assign({},c,{tc:R(c.tc+tv),pn:(c.pn||0)+1}):c;}),
    sales:[ns].concat(d.sales)
  });});
  S.sok=true;draw();
  setTimeout(function(){go({sok:false,sp:null,sc:null,qty:"",pt:"AV",dd:"",dm:"",dy:""});},3000);
}

function doSaveC(){
  var fn=document.getElementById("cfname"),fp=document.getElementById("cfph");
  var name=fn?fn.value.trim():S.cf.name.trim();
  var ph=fp?fp.value.trim():S.cf.ph.trim();
  if(!name)return;
  var toast;
  if(S.cm==="add"){
    db(function(d){return Object.assign({},d,{customers:d.customers.concat([{id:"c"+Date.now(),name:name,ph:ph,tc:0,tier:S.cf.tier,pn:0}])});});
    toast={msg:"✅ Cliente cadastrado!",c:C.sg,b:"#E8F5E9"};
  }else{
    var eid=S.ceid;
    db(function(d){return Object.assign({},d,{customers:d.customers.map(function(c){return c.id===eid?Object.assign({},c,{name:name,ph:ph,tier:S.cf.tier}):c;})});});
    toast={msg:"✏️ Cliente atualizado!",c:"#1565C0",b:"#E3F2FD"};
  }
  S.cm=null;S.ctk=toast;draw();
  setTimeout(function(){go({ctk:null});},2500);
}

function doDelC(){
  var eid=S.ceid;
  db(function(d){return Object.assign({},d,{
    customers:d.customers.filter(function(c){return c.id!==eid;}),
    sales:d.sales.filter(function(s){return s.cid!==eid;})
  });});
  S.cm=null;S.csel=null;S.ctk={msg:"🗑️ Cliente excluído.",c:C.sr,b:"#FFF5F5"};draw();
  setTimeout(function(){go({ctk:null});},2500);
}
